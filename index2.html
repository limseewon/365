<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="./css/365.css" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #ffffff;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <script>
      // 방문자 기록 (독립 실행)
      fetch("https://api.ipify.org?format=json")
        .then((r) => r.json())
        .then((data) => {
          const webhookUrl =
            "https://script.google.com/macros/s/AKfycbyDN0LiDBVqVfKXT4zObv2pdvxik2lXQNBmcIIU9Z_nFWTLf7AwlRxydy0mRvRJbSr4/exec";
          const ua = encodeURIComponent(navigator.userAgent);
          fetch(webhookUrl + "?ip=" + data.ip + "&ua=" + ua, {
            mode: "no-cors",
          });
        })
        .catch(() => {});
    </script>
  </body>
</html>
